appId: com.aether.browser
productName: Aether Browser

directories:
  buildResources: build

extraResources:
  - from: build/favicon.ico
    to: favicon.ico

extraMetadata:
  buildTag: ${env.BUILD_TAG}
  buildSha: ${env.BUILD_SHA}
  buildTime: ${env.BUILD_TIME}

win:
  target: nsis
  icon: build/favicon.ico
  signAndEditExecutable: false

nsis:
  oneClick: true
  allowToChangeInstallationDirectory: false

mac:
  target: dmg
  icon: build/icon.png
  category: public.app-category.utilities

dmg:
  artifactName: Aether-Browser-${version}-mac.${ext}

publish:
  provider: github
  releaseType: release
