appId: com.aether.browser
productName: Aether Browser

directories:
  buildResources: build

icon: favicon.ico
extraResources:
  - from: build/favicon.ico
    to: favicon.ico

extraMetadata:
  buildTag: ${env.BUILD_TAG}
  buildSha: ${env.BUILD_SHA}
  buildTime: ${env.BUILD_TIME}

win:
  target: nsis
  icon: favicon.ico
  signAndEditExecutable: false

nsis:
  oneClick: true
  allowToChangeInstallationDirectory: false

publish:
  provider: github
  releaseType: release
